name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: GHCR image tag to deploy
        required: true
        default: latest
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy To Kubernetes
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Deploy Inputs
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.K8S_DEPLOYMENT_NAME }}
          K8S_CONTAINER_NAME: ${{ secrets.K8S_CONTAINER_NAME }}
        run: |
          test -n "$KUBE_CONFIG_DATA"
          test -n "$K8S_NAMESPACE"
          test -n "$K8S_DEPLOYMENT_NAME"
          test -n "$K8S_CONTAINER_NAME"

      - name: Write Kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify Image Exists
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/agentic-legal-deposition-demo-api:${{ github.event.inputs.image_tag }}
        run: docker manifest inspect "$IMAGE_REF" >/dev/null

      - name: Deploy Image
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/agentic-legal-deposition-demo-api:${{ github.event.inputs.image_tag }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.K8S_DEPLOYMENT_NAME }}
          K8S_CONTAINER_NAME: ${{ secrets.K8S_CONTAINER_NAME }}
        run: |
          kubectl set image deployment/"$K8S_DEPLOYMENT_NAME" "$K8S_CONTAINER_NAME"="$IMAGE_REF" --namespace "$K8S_NAMESPACE"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT_NAME" --namespace "$K8S_NAMESPACE" --timeout=300s

      - name: Show Deployed Image
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.K8S_DEPLOYMENT_NAME }}
        run: kubectl get deployment "$K8S_DEPLOYMENT_NAME" --namespace "$K8S_NAMESPACE" -o wide
