name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ensure Report Directory
        run: mkdir -p reports

      - name: Validate Frontend Script Syntax
        run: node --check frontend/app.js

      - name: Run Pytest
        run: pytest -q

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: |
            reports/tests.html
            reports/junit.xml
          if-no-files-found: error

  docker-build:
    name: Build API Image
    needs:
      - test
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build --file Dockerfile --tag agentic-legal-deposition-demo-api:ci .

  compose-validate:
    name: Validate Compose Configuration
    needs:
      - test
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Prepare Local CI Environment
        run: |
          mkdir -p reports

      - name: Validate Docker Compose File
        run: docker compose config -q

  publish-image:
    name: Publish API Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - docker-build
      - compose-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentic-legal-deposition-demo-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build And Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
