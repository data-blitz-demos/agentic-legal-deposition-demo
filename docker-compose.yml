services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deposition-api
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-5.2}
      OPENAI_MODELS: ${OPENAI_MODELS:-gpt-5.2}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-initium/law_model:latest}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-initium/law_model:latest,initium/law_model:Q2_K}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      LLM_READINESS_TTL_SECONDS: ${LLM_READINESS_TTL_SECONDS:-120}
      LLM_PROBE_TIMEOUT_SECONDS: ${LLM_PROBE_TIMEOUT_SECONDS:-12}
      LLM_OPTIONS_PROBE_WORKERS: ${LLM_OPTIONS_PROBE_WORKERS:-3}
      COUCHDB_URL: http://admin:password@couchdb:5984
      COUCHDB_DB: ${COUCHDB_DB:-depositions}
      MEMORY_DB: ${MEMORY_DB:-memory}
      THOUGHT_STREAM_DB: ${THOUGHT_STREAM_DB:-thought_stream}
      RAG_STREAM_DB: ${RAG_STREAM_DB:-rag-stream}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_BROWSER_URL: ${NEO4J_BROWSER_URL:-http://localhost:7474/browser/}
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3000}
      GRAFANA_ADMIN_USER: admin
      GRAFANA_ADMIN_PASSWORD: password
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/application.log}
      ONTOLOGY_DIR: /data/ontology
      MAX_CONTEXT_DEPOSITIONS: ${MAX_CONTEXT_DEPOSITIONS:-20}
      DEPOSITION_DIR: /data/depositions
      DEPOSITION_EXTRA_DIRS: ${DEPOSITION_EXTRA_DIRS:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - couchdb
      - neo4j
    volumes:
      - ${DEPOSITION_DIR:-./depositions}:/data/depositions
      - ${ONTOLOGY_DIR:-./ontology}:/data/ontology:ro
      - ${REPORTS_DIR:-./reports}:/app/reports
      - ${LOGS_DIR:-./logs}:/app/logs

  couchdb:
    image: couchdb:3
    container_name: deposition-couchdb
    ports:
      - "${COUCHDB_PORT:-5984}:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    volumes:
      - couchdb_data:/opt/couchdb/data

  neo4j:
    image: neo4j:5-community
    container_name: deposition-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
    volumes:
      - neo4j_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: deposition-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  loki:
    image: grafana/loki:2.9.8
    container_name: deposition-loki
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./deploy/observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: deposition-promtail
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ${LOGS_DIR:-./logs}:/var/log/attorneyos:ro
      - promtail_data:/tmp
    depends_on:
      - api
      - loki

  grafana:
    image: grafana/grafana-oss:latest
    container_name: deposition-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

volumes:
  couchdb_data:
  neo4j_data:
  prometheus_data:
  loki_data:
  promtail_data:
